<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
    <h:head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <h:outputStylesheet library="css" name="style.css" />
        <title>Product</title>
    </h:head>

    <f:metadata>
        <f:viewParam name="id" value="#{productBean.id}" />
        <f:viewAction action="#{productBean.load}" />
    </f:metadata>

    <h:body>
        <h:outputText value="Welcome, #{loginBean.customer.name}" rendered="#{not empty loginBean.customer}" />
        <p:menubar>
            <f:facet name="start">
                <h:link value="KeyStore" outcome="index" style="font-weight:bold; font-size:32px " />
            </f:facet>
            <f:facet name="end">
                <h:link value="New Product" outcome="addProduct" style="margin-right:15px;" />
                <p:divider layout="vertical"/>
                <h:link value="Register" outcome="register" style="margin-left:15px;" />
            </f:facet>
        </p:menubar>


        <p:outputPanel id="productDetailContainer" style="max-width: 1000px; margin: 2rem auto; padding: 0 1rem;">

            <h1 style="font-size: 2rem; font-weight: bold; margin-bottom: 1.5rem; color: #333;">
                #{productBean.product.name}
            </h1>

            <p:card style="margin-bottom: 2rem; overflow: hidden;">
                <f:facet name="header">
                    <img src="#{productBean.product.image}" 
                         style="width: 100%; height: 400px; object-fit: cover;" 
                         alt="Product Image" />
                </f:facet>

                <h3 style="margin-top: 0;">Description</h3>
                <p style="line-height: 1.6; color: #666;">
                    #{productBean.product.description}
                </p>

                <p:divider />

                <h:panelGrid columns="2" cellpadding="7">
                    <h:outputText value="Price:" style="font-weight: bold; font-size: 1.1rem;" />
                    <h:outputText value="#{productBean.product.price}" style="font-size: 1.1rem; color: #2c3e50;">
                        <f:convertNumber type="currency" currencySymbol="฿" />
                    </h:outputText>

                    <h:outputText value="Seller:" style="font-weight: bold;" />
                    <h:outputText value="#{productBean.product.sellerName}" />
                </h:panelGrid>
            </p:card>

            <h:form>
                <p:commandButton value="Buy Now"
                                 action="#{orderBean.create(productBean.product.id)}"
                                 icon="pi pi-shopping-cart"
                                 ajax="false"
                                 styleClass="ui-button-warning"/>
            </h:form>

            <p:panel header="Reviews">
                <p:dataScroller value="#{productBean.reviews}" var="r" chunkSize="10">
                    <h:panelGroup layout="block" style="border-bottom: 1px solid #eee; padding: 1rem 0;">
                        <h:panelGroup style="display: flex; justify-content: space-between; align-items: center;">
                            <h:panelGroup>
                                <p:rating value="#{r.rating}" readonly="true" />
                                <h:outputText value="From: #{r.customerName}" style="font-size: 0.85rem; color: #888;" />
                            </h:panelGroup>
                            <h:outputText value="#{r.createdAt}" style="font-size: 0.85rem; color: #999;">
                                <f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
                            </h:outputText>
                        </h:panelGroup>
                    </h:panelGroup>
                </p:dataScroller>
            </p:panel>

        </p:outputPanel>

    </h:body>
</html>
