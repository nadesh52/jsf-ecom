<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="primefaces">

    <h:head>
        <title>Create Product</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </h:head>

    <f:metadata>
        <f:viewAction action="#{productBean.checkAdminAccess}" />
    </f:metadata>

    <h:body>
        <p:menubar>
            <f:facet name="start">
                <h:link value="KeyStore" outcome="index" style="font-weight:bold; font-size:32px " />
            </f:facet>
            <f:facet name="end">
                <h:link value="New Product" outcome="addProduct" style="margin-right:15px;" />
                <h:link value="Register" outcome="register" style="margin-left:15px;" />
            </f:facet>
        </p:menubar>

        <p:outputPanel id="addProductContainer" style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 2rem;">

            <p:panel header="Add Product" style="width: 100%; max-width: 600px;">

                <h:form id="addProductForm" enctype="multipart/form-data">
                    <p:messages id="msgs" showDetail="true" closable="true">
                        <p:autoUpdate />
                    </p:messages>

                    <h:panelGrid columns="1" styleClass="ui-fluid" style="width: 100%; margin-bottom: 1.5rem;">

                        <p:outputLabel for="name" value="Product Name" style="font-weight: bold;" />
                        <p:inputText id="name" value="#{productBean.product.name}" required="true" 
                                     placeholder="e.g. Windows 11 Pro Key" />

                        <p:spacer height="10" />

                        <p:outputLabel for="price" value="Price" style="font-weight: bold;" />
                        <p:inputNumber id="price" value="#{productBean.product.price}" 
                                       symbol=" ฿" symbolPosition="s" decimalPlaces="2" required="true" />

                        <p:spacer height="10" />

                        <p:outputLabel for="desc" value="Description" style="font-weight: bold;" />
                        <p:inputTextarea id="desc" value="#{productBean.product.description}" 
                                         rows="3" autoResize="false" />

                        <p:spacer height="10" />

                        <p:outputLabel for="key" value="Product Key" style="font-weight: bold;" />
                        <p:inputText id="key" value="#{productBean.product.product_key}" required="true"
                                     placeholder="XXXXX-XXXXX-XXXXX-XXXXX" />

                        <p:spacer height="10" />

                        <p:outputLabel for="seller" value="Seller ID" style="font-weight: bold;" />
                        <p:inputText id="seller" value="#{productBean.product.sellerId}" required="true" />

                        <p:spacer height="10" />

                        <p:outputLabel for="imageUpload" value="Product Image" style="font-weight: bold;" />

                        <p:fileUpload id="imageUpload" 
                                      listener="#{productBean.handleFileUpload}" 
                                      mode="advanced" 
                                      auto="true" 
                                      update="previewContainer" />

                        <h:panelGroup id="previewContainer">
                            <ui:fragment rendered="#{not empty productBean.product.image}">
                                <img src="#{productBean.product.image}" 
                                     style="width: 250px; height: 250px; object-fit: contain; border: 1px solid #ddd; padding: 5px; border-radius: 4px;" />
                            </ui:fragment>
                        </h:panelGroup>

                    </h:panelGrid>

                    <p:commandButton value="Add Product"
                                     action="#{productBean.create}"
                                     ajax="false"
                                     icon="pi pi-plus-circle"
                                     styleClass="ui-button-raised ui-button-primary"
                                     style="width: 100%; padding: 0.5rem;" />
                </h:form>
            </p:panel>
        </p:outputPanel>

    </h:body>
</html>
